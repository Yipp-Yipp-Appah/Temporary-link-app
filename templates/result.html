<!DOCTYPE html>
<html>
<head>
    <title>Link Created</title>
</head>
<body>

<h2>Interview Link Created</h2>

<p>Copy and paste this into Odoo:</p>

<input id="linkBox"
       value="{{ link }}"
       style="width:600px"
       readonly
       onclick="copyLink()">

<button onclick="copyLink()">Copy Link</button>

<p><a href="{{ link }}" target="_blank">Test Link</a></p>

<script>
function copyLink() {
    const box = document.getElementById("linkBox");
    box.select();
    document.execCommand("copy");
}
</script>

</body>
</html>
